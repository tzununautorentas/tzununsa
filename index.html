<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#00D4AA" />
    <meta name="description" content="Tz'unun AutoRentas — Sistema de gestión integral" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TzununSA" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-152.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png" />
    <title>Tz'unun AutoRentas</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0A0F1E; color: #F1F5F9; font-family: 'Segoe UI', sans-serif; }
      #splash {
        position: fixed; inset: 0; background: #0A0F1E;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; gap: 16px; transition: opacity .4s;
      }
      #splash-logo {
        width: 80px; height: 80px; border-radius: 18px;
        background: linear-gradient(135deg,#00D4AA,#3B82F6);
        display: flex; align-items: center; justify-content: center; font-size: 42px;
      }
      #splash h1 { font-size: 22px; font-weight: 800; color: #00D4AA; }
      #splash p  { font-size: 13px; color: #64748B; }
      #splash-bar { width: 160px; height: 4px; background: #1E3A5F; border-radius: 2px; overflow: hidden; }
      #splash-prog { height: 100%; background: #00D4AA; border-radius: 2px; animation: load 1.8s ease forwards; }
      @keyframes load { from { width:0 } to { width:100% } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-logo">🐦</div>
      <h1>Tz'unun AutoRentas</h1>
      <p>Más comodidad, rapidez y mejores precios</p>
      <div id="splash-bar"><div id="splash-prog"></div></div>
    </div>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(r => console.log('[SW] Registrado:', r.scope))
            .catch(e => console.log('[SW] Error:', e));
        });
      }
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 400); }
        }, 1800);
      });
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault(); deferredPrompt = e;
        window.__pwaPrompt = () => { deferredPrompt.prompt(); deferredPrompt = null; };
        window.dispatchEvent(new CustomEvent('pwa-installable'));
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
